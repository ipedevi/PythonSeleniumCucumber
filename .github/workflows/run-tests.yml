name: Run Tests

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Mensaje en formato JSON'
        required: true

# 🔥 NECESARIO para publicar en GitHub Pages
permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      # 📦 Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🌐 Chrome para Selenium
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 🧠 Crear feature dinámico
      - name: Create feature file
        run: |
          echo '${{ github.event.inputs.mensaje }}' > payload.json

          echo "Parsing JSON..."
          FEATURE=$(jq -r '.feature' payload.json)
          SCENARIO=$(jq -r '.scenario' payload.json)

          mkdir -p source/features

          echo "Feature: $FEATURE" > source/features/execution.feature
          echo "" >> source/features/execution.feature
          echo "  @auto" >> source/features/execution.feature
          echo "  Scenario: $SCENARIO" >> source/features/execution.feature

          jq -r '.steps[] | "    \(. )"' payload.json >> source/features/execution.feature

          echo "----- GENERATED FEATURE -----"
          cat source/features/execution.feature

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 Dependencias
      - name: Install dependencies
        run: |
          pip install selenium behavex allure-behave requests

      # ⚙️ Forzar headless en CI
      - name: Force headless config
        run: |
          sed -i 's/"headless": False/"headless": True/' myconfig.py

      # 🧪 Ejecutar tests
      - name: Run Tests
        run: |
          behave source/features/execution.feature

      # 📊 Instalar Allure CLI (correcto)
      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      # 📈 Generar reporte
      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      # 📦 Guardar artefacto
      - name: Upload Allure report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # 🌍 Publicar en GitHub Pages
      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # 🔗 Mostrar URL final
      - name: Print report URL
        if: always()
        run: |
          echo "===================================="
          echo "REPORT URL:"
          echo "https://ipedevi.github.io/PythonSeleniumCucumber/"
          echo "===================================="