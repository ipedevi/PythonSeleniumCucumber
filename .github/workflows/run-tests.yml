name: Run Tests

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Mensaje en formato JSON'
        required: true

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 🧠 Crear el feature dinámico
      - name: Create feature file
        run: |
          echo '${{ github.event.inputs.mensaje }}' > payload.json

          echo "Parsing JSON..."
          FEATURE=$(jq -r '.feature' payload.json)
          SCENARIO=$(jq -r '.scenario' payload.json)

          mkdir -p source/features

          echo "Feature: $FEATURE" > source/features/execution.feature
          echo "" >> source/features/execution.feature
          echo "  @auto" >> source/features/execution.feature
          echo "  Scenario: $SCENARIO" >> source/features/execution.feature

          jq -r '.steps[] | "    \(. )"' payload.json >> source/features/execution.feature

          echo "----- GENERATED FEATURE -----"
          cat source/features/execution.feature

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 Instalar dependencias
      - name: Install dependencies
        run: |
          pip install selenium behavex allure-behave requests

      # 🧪 Ejecutar Behave SOLO con @auto
      - name: Run Behave
        run: |
          behave --tags='@auto'

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report