name: Run Tests

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Gherkin feature content'
        required: true

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Create feature file
        run: |
          mkdir -p source/features
          cat > source/features/execution.feature << 'GHERKIN'
          ${{ github.event.inputs.mensaje }}
          GHERKIN
          echo "----- GENERATED FEATURE -----"
          cat source/features/execution.feature

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium behavex allure-behave requests

      - name: Force headless config
        run: |
          sed -i 's/"headless": False/"headless": True/' myconfig.py

      - name: Run Tests
        run: |
          behave source/features/execution.feature

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      - name: Print report URL
        if: always()
        run: |
          echo "===================================="
          echo "REPORT URL:"
          echo "https://ipedevi.github.io/PythonSeleniumCucumber/"
          echo "===================================="